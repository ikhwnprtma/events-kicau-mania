#USERS DOC
  /api/users:
    get:
      summary: Ambil semua data user
      tags:
        - Users
      responses:
        '200':
          description: Berhasil mengambil semua data user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Berhasil mengambil semua data user"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserResponseData'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'

    post:
      summary: Tambah user baru (Register)
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User berhasil ditambahkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "User berhasil ditambahkan!"
                  data:
                    $ref: '#/components/schemas/UserResponseData'
        '400':
          description: Bad Request (Input kurang atau email duplikat)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Email sudah terdaftar, gunakan email lain."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'

  /api/users/{id}:
    get:
      summary: Ambil detail user berdasarkan ID
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID dari user yang ingin dicari
      responses:
        '200':
          description: Berhasil mengambil detail user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Berhasil mengambil detail user"
                  data:
                    $ref: '#/components/schemas/UserResponseData'
        '404':
          description: User tidak ditemukan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "User dengan ID 1 tidak ditemukan"
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'

    put:
      summary: Update data user berdasarkan ID
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID dari user yang ingin diperbarui
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Data user berhasil diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Data user berhasil diperbarui!"
                  data:
